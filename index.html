<!DOCTYPE html>
<html>

<head>
    <title>Chess PGN Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        a {
            display: none;
            margin-top: 10px;
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Chess PGN Generator</h1>
        <input type="text" id="username" placeholder="Enter Username" />
        <button id="generateButton">Generate PGN</button>
        <a id="downloadLink" download>Download PGN</a>
    </div>

    <script>
        const generateButton = document.getElementById('generateButton');
        const downloadLink = document.getElementById('downloadLink');

        generateButton.addEventListener('click', async () => {
            const username = document.getElementById('username').value;
            if (username) {
                try {
                    const archivesResponse = await fetch(`https://api.chess.com/pub/player/${username}/games/archives`, { mode: 'cors' });
                    const archivesData = await archivesResponse.json();

                    // Iterate through archives and fetch games for each month and year
                    const pgnData = await fetchAndConcatenatePGN(archivesData.archives);

                    // Create a Blob for the PGN data
                    const blob = new Blob([pgnData], { type: 'text/plain' });

                    // Create a URL for the Blob and set it as the download link
                    const url = URL.createObjectURL(blob);
                    downloadLink.href = url;
                    downloadLink.style.display = 'block';
                } catch (error) {
                    console.error('Error:', error);
                }
            }
        });

        async function fetchAndConcatenatePGN(archives) {
            const pgnGames = [];

            for (const archiveUrl of archives) {
                try {
                    const archiveResponse = await fetch(archiveUrl, { mode: 'cors' });
                    const archiveData = await archiveResponse.json();

                    // Append PGN-formatted games to pgnGames
                    pgnGames.push(...archiveData.games);
                } catch (error) {
                    console.error('Error fetching games:', error);
                }
            }

            return pgnGames.join('\n\n');
        }
    </script>
</body>

</html>
